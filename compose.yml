services:
  ros2_humble:
    build:
      context: .
      args:
        USERNAME: ${USER:-wuyang_humble}
        USER_UID: ${UID:-1000}
        USER_GID: ${GID:-1000}
    image: ros2-humble-dev:latest
    container_name: ros2-humble-workspace
    network_mode: host
    ipc: host
    pid: host
    stdin_open: true
    tty: true
    working_dir: /home/${USER:-wuyang_humble}/humble_ws
    user: ${USER:-wuyang_humble}

    environment:
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
      - DISPLAY=:0
      - LIBGL_ALWAYS_SOFTWARE=1

    volumes:
      # Workspace with persistent build cache
      - workspace:/home/${USER:-wuyang_humble}/humble_ws

      # Source code overlays on top
      - ./src:/home/${USER:-wuyang_humble}/humble_ws/src

      # X11 for GUI applications
      - /tmp/.X11-unix:/tmp/.X11-unix

    extra_hosts:
      - "host.docker.internal:host-gateway"

    command: /bin/bash

volumes:
  workspace:
