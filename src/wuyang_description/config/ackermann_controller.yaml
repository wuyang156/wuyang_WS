controller_manager:
  ros__parameters:
    update_rate: 50  
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ackermann_controller:
      type: ackermann_steering_controller/AckermannSteeringController


ackermann_controller:
  ros__parameters: 
    use_sim_time: true

    rear_wheels_names:
      - left_rear_rolling_joint
      - right_rear_rolling_joint
    front_wheels_names:
      - left_front_steering_joint
      - right_front_steering_joint

    wheelbase: 0.144
    front_wheel_track: 0.158
    rear_wheel_track: 0.158
    front_wheels_radius: 0.034
    rear_wheels_radius: 0.034

    reference_timeout: 2.0
    front_steering: true
    open_loop: false
    position_feedback: true
    odom_frame_id: odom
    base_frame_id: base_footprint
    
    linear:
      x:
        has_velocity_limits: true
        max_velocity: 1.0
        has_acceleration_limits: true
        max_acceleration: 0.8
    angular:
      z:
        has_velocity_limits: true
        max_velocity: 1.5
        has_acceleration_limits: true
        max_acceleration: 1.0